<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Brandly</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="navbar-brand">Brandly</a>
    <div id="navbarNav" style="display:flex;align-items:center;gap:6px;flex:1"></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Brandly</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your account to continue</p>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Create one →</a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  const params     = new URLSearchParams(window.location.search);
  const redirectTo = params.get('redirect') || null;

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert('alertBox');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Logging in…';

    try {
      const data = await api('POST', '/api/auth/login', {
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      if (redirectTo)           window.location.href = redirectTo;
      else if (data.role === 'blogger') window.location.href = '/edit-profile.html';
      else if (data.role === 'admin')   window.location.href = '/admin.html';
      else                              window.location.href = '/catalog.html';
    } catch (err) {
      showAlert('alertBox', err.message);
      btn.disabled = false; btn.textContent = 'Log In';
    }
  });
</script>
</body>
</html>
