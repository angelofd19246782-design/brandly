<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Influencer Profile — Brandly</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="navbar-brand">Brandly</a>
    <div id="navbarNav" style="display:flex;align-items:center;gap:6px;flex:1"></div>
  </div>
</nav>

<div class="page-wrap">
  <div class="container">
    <a href="/catalog.html" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>Back to catalog</a>
    <div id="profileContent">
      <div class="loading">Loading profile…</div>
    </div>
  </div>
</div>

<footer class="site-footer footer-rich">
  <div class="container">
    <div class="footer-inner" style="padding:40px 0 28px">
      <div class="footer-bottom" style="border-top:none;padding-top:0">
        <p>© 2024 <strong style="color:#94a3b8">Brandly</strong> — Influencer Marketplace</p>
        <p><a href="/catalog.html" style="color:#64748b;text-decoration:none">Browse Influencers</a> · <a href="/" style="color:#64748b;text-decoration:none">Home</a></p>
      </div>
    </div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('id');
  if (!userId) window.location.href = '/catalog.html';

  const initials = (n) => n ? n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase() : '?';

  let selectedScore = 0;
  const selectStar = (score) => {
    selectedScore = score;
    document.querySelectorAll('.star-picker button').forEach((b, i) => b.classList.toggle('active', i < score));
  };

  // Send-request modal — opens a campaign brief form, on submit creates a
  // conversation and sends the brief as a structured first message.
  const sendRequest = async () => {
    const user = await getUser();
    if (!user) { window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }
    if (user.role !== 'advertiser') {
      await notify('Only brands can send requests to creators.', { title: 'Action not allowed' });
      return;
    }
    openRequestModal();
  };

  // Keep the old name working for any inline handlers we missed
  const contactBlogger = sendRequest;

  const openRequestModal = () => {
    const root = document.body.appendChild(document.createElement('div'));
    root.id = '_brandlyRequestRoot';
    root.innerHTML = `
      <div class="modal-overlay">
        <div class="modal-box request-modal">
          <button type="button" class="request-modal-close" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
          <div class="request-modal-hdr">
            <div class="request-modal-eyebrow">New campaign request</div>
            <h3>Send a brief to this creator</h3>
            <p>The creator will see your request and can accept or decline. If accepted, your private thread opens for direct conversation.</p>
          </div>
          <div id="reqAlert"></div>
          <form id="requestForm">
            <div class="form-group">
              <label for="reqTitle">Campaign title <span style="color:var(--c-red)">*</span></label>
              <input type="text" id="reqTitle" placeholder="e.g. Spring vitamin C launch" required maxlength="120">
            </div>
            <div class="form-row cols-2">
              <div class="form-group">
                <label for="reqFormat">Content format</label>
                <select id="reqFormat">
                  <option value="">— Select format —</option>
                  <option>Single post</option>
                  <option>Story series</option>
                  <option>Reel / Short video</option>
                  <option>Long-form video</option>
                  <option>Multi-post campaign</option>
                  <option>Other (described in message)</option>
                </select>
              </div>
              <div class="form-group">
                <label for="reqBudget">Budget (USD)</label>
                <input type="number" id="reqBudget" placeholder="e.g. 1500" min="0">
              </div>
            </div>
            <div class="form-group">
              <label for="reqDeadline">Deadline</label>
              <input type="date" id="reqDeadline">
            </div>
            <div class="form-group" style="margin-bottom:8px">
              <label for="reqMessage">Message to the creator <span style="color:var(--c-red)">*</span></label>
              <textarea id="reqMessage" rows="5" placeholder="Describe what you'd like to collaborate on, what makes this creator a fit, and any specific deliverables." required></textarea>
            </div>
            <div class="request-modal-footer">
              <button type="button" class="btn btn-ghost" data-cancel>Cancel</button>
              <button type="submit" class="btn btn-primary" id="reqSubmit">Send request</button>
            </div>
          </form>
        </div>
      </div>`;

    const cleanup = () => {
      root.remove();
      document.removeEventListener('keydown', onKey);
    };
    const onKey = (e) => { if (e.key === 'Escape') cleanup(); };
    document.addEventListener('keydown', onKey);

    root.querySelector('.modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) cleanup();
    });
    root.querySelector('.request-modal-close').addEventListener('click', cleanup);
    root.querySelector('[data-cancel]').addEventListener('click', cleanup);
    setTimeout(() => root.querySelector('#reqTitle').focus(), 50);

    root.querySelector('#requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title    = root.querySelector('#reqTitle').value.trim();
      const format   = root.querySelector('#reqFormat').value;
      const budget   = root.querySelector('#reqBudget').value;
      const deadline = root.querySelector('#reqDeadline').value;
      const message  = root.querySelector('#reqMessage').value.trim();

      if (!title || !message) {
        showAlert('reqAlert', 'Title and message are required.');
        return;
      }

      const submitBtn = root.querySelector('#reqSubmit');
      submitBtn.disabled = true; submitBtn.textContent = 'Sending…';

      try {
        // 1. Create or fetch existing conversation with this creator
        const conv = await api('POST', '/api/conversations', { blogger_id: parseInt(userId) });

        // 2. Send the structured brief as the first message. We use a
        //    machine-parseable header so chat.html can render it as a
        //    request card; the human-readable body follows below.
        const lines = [];
        lines.push('[BRANDLY:REQUEST]');
        lines.push('Title: ' + title);
        if (format)   lines.push('Format: ' + format);
        if (budget)   lines.push('Budget: $' + parseInt(budget).toLocaleString());
        if (deadline) lines.push('Deadline: ' + deadline);
        lines.push('');
        lines.push(message);
        const content = lines.join('\n');

        await api('POST', `/api/conversations/${conv.id}/messages`, { content });

        // 3. Mark this order as Pending in client-side state
        setOrderState(conv.id, {
          status:    'pending',
          createdAt: Date.now(),
          title:     title,
          format:    format || null,
          budget:    budget ? parseInt(budget) : null,
          deadline:  deadline || null,
          brandId:   user.id,
          bloggerId: parseInt(userId),
        });

        showToast('Request sent — opening the order thread', 'success');

        // 4. Redirect to the order/chat page
        window.location.href = `/chat.html?id=${conv.id}`;
      } catch (err) {
        showAlert('reqAlert', err.message || 'Could not send the request.');
        submitBtn.disabled = false; submitBtn.textContent = 'Send request';
      }
    });
  };

  const submitRating = async () => {
    if (!selectedScore) { await notify('Please select a star rating first.', { title: 'Rating required' }); return; }
    const btn = document.getElementById('rateBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await api('POST', '/api/ratings', {
        blogger_id: parseInt(userId),
        score:      selectedScore,
        review:     document.getElementById('reviewText').value.trim(),
      });
      showAlert('ratingAlert', 'Your rating has been saved!', 'success');
      loadReviews();
    } catch (err) {
      showAlert('ratingAlert', err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Submit Rating';
    }
  };

  const loadReviews = async () => {
    try {
      const reviews = await api('GET', `/api/ratings/${userId}`);
      const el = document.getElementById('reviewsList');
      if (!reviews.length) {
        el.innerHTML = '<p style="color:var(--c-ink-4);font-size:.875rem;font-style:italic">No reviews yet.</p>';
        return;
      }
      el.innerHTML = reviews.map(r => `
        <div class="review-item">
          <div class="review-header">
            <span class="review-author">${escHtml(r.advertiser_name)}</span>
            <div class="review-meta">
              ${starsSvg(r.score)}
              <span class="review-date">${formatDate(r.created_at)}</span>
            </div>
          </div>
          ${r.review ? `<p class="review-body">${escHtml(r.review)}</p>` : ''}
        </div>`).join('');
    } catch (_) {}
  };

  (async () => {
    try {
      const [blogger, user] = await Promise.all([
        api('GET', `/api/bloggers/${userId}`),
        getUser(),
      ]);

      document.title = `${blogger.display_name} — Brandly`;

      const avatar = blogger.avatar_url
        ? `<img src="${escHtml(blogger.avatar_url)}" alt="">`
        : initials(blogger.display_name);

      const platformLinks = [
        blogger.tiktok_url    ? `<a href="${escHtml(blogger.tiktok_url)}" target="_blank" rel="noopener" class="platform-link">${icon('tiktok', 13)} TikTok</a>` : '',
        blogger.youtube_url   ? `<a href="${escHtml(blogger.youtube_url)}" target="_blank" rel="noopener" class="platform-link">${icon('youtube', 13)} YouTube</a>` : '',
        blogger.instagram_url ? `<a href="${escHtml(blogger.instagram_url)}" target="_blank" rel="noopener" class="platform-link">${icon('instagram', 13)} Instagram</a>` : '',
      ].filter(Boolean).join('');

      const price = blogger.price_min || blogger.price_max
        ? `$${blogger.price_min || 0}${blogger.price_max ? ' – $'+blogger.price_max : '+'}`
        : 'Negotiable';

      const starsHtml = blogger.avg_rating
        ? `${starsSvg(Math.round(blogger.avg_rating))}
           <strong>${Number(blogger.avg_rating).toFixed(1)}</strong>
           <span style="color:var(--c-ink-4);font-size:.8rem">(${blogger.rating_count} review${blogger.rating_count!==1?'s':''})</span>`
        : `<span style="color:var(--c-ink-4);font-size:.82rem;font-style:italic">No reviews yet</span>`;

      // ── Best-for tags (category-driven, demo only) ─────────────────────────
      const bestForByCat = {
        'Fashion & Beauty':            ['Seasonal launches', 'Product reveals', 'Style content'],
        'Beauty & Skincare':            ['Product launches', 'Tutorials', 'Ingredient deep-dives'],
        'Health & Fitness':             ['Program launches', 'Recovery brands', 'Activewear'],
        'Food & Cooking':               ['Recipe integrations', 'Kitchenware', 'Pantry brands'],
        'Food & Travel':                ['Travel sponsorships', 'Editorial campaigns', 'Food brands'],
        'Travel':                       ['Destination campaigns', 'Gear reviews', 'Hospitality'],
        'Technology':                   ['Product reviews', 'Developer audiences', 'SaaS launches'],
        'Gaming':                       ['Game launches', 'Hardware sponsors', 'Stream integrations'],
        'Lifestyle':                    ['Brand storytelling', 'Home & living', 'Sustainable brands'],
        'Business & Entrepreneurship':  ['SaaS tools', 'Finance products', 'Online courses'],
        'Outdoors & Adventure':         ['Gear reviews', 'Adventure brands', 'Sustainable outdoor'],
        'Entertainment':                ['Streaming sponsorships', 'Event campaigns', 'Apps'],
      };
      const bestForTags = bestForByCat[blogger.category] || ['Brand collaborations', 'Product launches', 'Editorial content'];

      // ── Insight cards (demo analytics derived from existing data) ──────────
      const rating = blogger.avg_rating ? Number(blogger.avg_rating) : 0;
      const reviews = parseInt(blogger.rating_count || 0);
      const audienceMatch = rating ? Math.min(98, Math.round(rating * 18 + 6)) : 78;
      const responseHours = reviews >= 3 ? '~ 6h' : reviews >= 1 ? '~ 12h' : '~ 24h';
      const responseNote  = reviews >= 3 ? 'Responds fast during business hours' : reviews >= 1 ? 'Typically replies within a day' : 'New creator — response time TBD';
      const fitLabel  = rating >= 4.7 ? 'Excellent' : rating >= 4.3 ? 'Strong' : rating >= 4.0 ? 'Good' : 'Emerging';
      const fitNote   = reviews
        ? `${reviews} past brand ${reviews === 1 ? 'partnership' : 'partnerships'}`
        : 'Open to first partnerships';

      const insightGridHtml = `
        <div class="insight-grid">
          <div class="insight-card">
            <div class="insight-head">
              <div class="insight-icon-badge">${icon('target', 16)}</div>
              <div class="insight-label">Audience Match</div>
            </div>
            <div class="insight-value"><strong>${audienceMatch}%</strong> ${audienceMatch >= 90 ? 'excellent fit' : audienceMatch >= 80 ? 'strong fit' : 'good fit'}</div>
            <div class="insight-bar"><span style="width:${audienceMatch}%"></span></div>
          </div>
          <div class="insight-card">
            <div class="insight-head">
              <div class="insight-icon-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
              <div class="insight-label">Response Time</div>
            </div>
            <div class="insight-value"><strong>${responseHours}</strong> typical reply</div>
            <div class="insight-footnote">${responseNote}</div>
          </div>
          <div class="insight-card">
            <div class="insight-head">
              <div class="insight-icon-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-3a2 2 0 0 1-2-2V2"/><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="m9 18 2 2 4-4"/></svg></div>
              <div class="insight-label">Collaboration Fit</div>
            </div>
            <div class="insight-value"><strong>${fitLabel}</strong> reliability</div>
            <div class="insight-footnote">${fitNote}</div>
          </div>
        </div>`;

      let ctaHtml = '';
      if (!user) {
        ctaHtml = `<a href="/login.html?redirect=${encodeURIComponent(window.location.href)}" class="btn btn-primary btn-lg" style="width:100%">Sign in to send a request</a>`;
      } else if (user.role === 'advertiser') {
        ctaHtml = `<button id="contactBtn" class="btn btn-primary btn-lg" style="width:100%" onclick="sendRequest()">Send a request</button>`;
      } else if (user.role === 'blogger' && String(user.id) === String(userId)) {
        ctaHtml = `<a href="/edit-profile.html" class="btn btn-outline btn-lg" style="width:100%">Edit my profile</a>`;
      }

      let ratingFormHtml = '';
      if (user && user.role === 'advertiser') {
        let myRating = null;
        try { myRating = await api('GET', `/api/ratings/${userId}/mine`); } catch(_) {}
        if (myRating) selectedScore = myRating.score;

        ratingFormHtml = `
          <div class="card mt-6 rating-form">
            <div class="section-label-sm">${myRating ? 'Update your rating' : 'Leave a review'}</div>
            <div id="ratingAlert"></div>
            <div class="star-picker" style="margin-bottom:14px">
              ${[1,2,3,4,5].map(i =>
                `<button type="button" class="${myRating && i<=myRating.score?'active':''}" onclick="selectStar(${i})"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:block"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>`
              ).join('')}
            </div>
            <div class="form-group">
              <label for="reviewText">Review <span class="label-hint">optional</span></label>
              <textarea id="reviewText" rows="3" placeholder="Describe your experience working with this creator…">${myRating?.review ? escHtml(myRating.review) : ''}</textarea>
            </div>
            <button id="rateBtn" class="btn btn-primary" onclick="submitRating()">${myRating ? 'Update Rating' : 'Submit Rating'}</button>
          </div>`;
      }

      document.getElementById('profileContent').innerHTML = `
        <div class="profile-layout">
          <aside>
            <div class="profile-card-sticky">
              <div class="card">
                <div class="profile-identity has-cover">
                  <div class="profile-identity-cover"></div>
                  <div class="avatar avatar-2xl">${avatar}</div>
                  <h1>${escHtml(blogger.display_name)}</h1>
                  ${blogger.category ? `<div class="category" style="margin-top:8px"><span class="badge">${escHtml(blogger.category)}</span></div>` : ''}
                  ${blogger.country ? `<div class="location">${icon('mapPin', 12)} ${escHtml(blogger.country)}${blogger.city?', '+escHtml(blogger.city):''}</div>` : ''}
                </div>

                <div class="profile-stat-row">
                  <span class="k">Followers</span>
                  <span class="v" style="color:var(--c-primary);font-size:1rem">${formatFollowers(blogger.follower_count)}</span>
                </div>
                <div class="profile-stat-row">
                  <span class="k">Rating</span>
                  <span class="v"><span style="display:flex;align-items:center;gap:5px">${starsHtml}</span></span>
                </div>
                <div class="profile-stat-row">
                  <span class="k">Price range</span>
                  <span class="v price-tag">${price}</span>
                </div>
                ${blogger.contact_info ? `
                <div style="padding:12px 0;border-top:1px solid var(--c-border-soft);margin-top:4px">
                  <div class="section-label-sm" style="margin-bottom:6px">Contact info</div>
                  <p style="font-size:.82rem;color:var(--c-ink-3);line-height:1.6">${escHtml(blogger.contact_info)}</p>
                </div>` : ''}

                ${platformLinks ? `<div class="platform-links">${platformLinks}</div>` : ''}

                <div class="best-for-block">
                  <div class="section-label-sm" style="margin-bottom:8px">Best for brands</div>
                  <div class="best-for-tags">
                    ${bestForTags.map(t => `<span class="best-for-tag">${escHtml(t)}</span>`).join('')}
                  </div>
                </div>
              </div>

              ${ctaHtml ? `<div>${ctaHtml}</div>` : ''}
            </div>
          </aside>

          <main>
            ${insightGridHtml}

            <div class="card" style="margin-bottom:20px">
              <div class="section-label-sm">About</div>
              ${blogger.bio
                ? `<p style="color:var(--c-ink-2);line-height:1.75;font-size:.9rem">${escHtml(blogger.bio)}</p>`
                : `<p style="color:var(--c-ink-4);font-size:.875rem;font-style:italic">No bio provided yet.</p>`}
            </div>

            <div class="card">
              <div class="section-label-sm">Reviews</div>
              <div class="review-list" id="reviewsList"><div class="loading" style="padding:24px 0">Loading…</div></div>
            </div>

            ${ratingFormHtml}
          </main>
        </div>`;

      loadReviews();
    } catch (_) {
      document.getElementById('profileContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">${icon('frown', 48)}</div>
          <h3>Profile not found</h3>
          <p>This profile may not exist or has been removed.</p>
          <a href="/catalog.html" class="btn btn-outline mt-4">Back to catalog</a>
        </div>`;
    }
  })();
</script>
</body>
</html>
